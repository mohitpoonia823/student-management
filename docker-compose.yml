version: "3.9"

services:

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_PATH: /app/data/students.db
    volumes:
      - db_data:/app/data
    ports:
      - "5000:5000"
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: ""
    container_name: sms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sms-network

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  db_data:
    name: sms-db-data

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  sms-network:
    name: sms-network
    driver: bridge