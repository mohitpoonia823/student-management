version: "3.9"

services:

  backend:
    build:
      target: builder
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]

  frontend:
    build:
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "start"]
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:5000
    ports:
      - "3000:3000"