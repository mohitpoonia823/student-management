name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Build & Push to Docker Hub ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sms-frontend:sha-${{ github.sha }}
          build-args: REACT_APP_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ────────────────────────────────────────────────────────
  deploy-render:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🚀 Trigger backend deploy
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            --fail -s
          echo "✅ Backend deploy triggered"

      - name: 🚀 Trigger frontend deploy
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            --fail -s
          echo "✅ Frontend deploy triggered"

      - name: 📣 Deployment summary
        run: |
          echo "### 🚀 Deployment Triggered!" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ✅ Deploying |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Deploying |" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY